# netemu test configuration
# Controller: bbchain1
# Nodes:      bbchain2..bbchain15  → group: lan  (1gbit, 1ms)
#             bbchain16..bbchain30 → group: wan  (100mbit, 50ms)
# Cross-group (lan↔wan) links use the wan profile.

interface: enp1s0f0np0

profiles:
  lan:
    rate: 1gbit
    delay: 1ms
  wan:
    rate: 100mbit
    delay: 50ms
    loss: 0.1

link_profiles:
  - {from_group: lan, to_group: lan, profile: lan}
  - {from_group: wan, to_group: wan, profile: wan}
  - {from_group: lan, to_group: wan, profile: wan}
  - {from_group: wan, to_group: lan, profile: wan}

replicas:
  # LAN group (bbchain2–bbchain15)
  - {id: "2",  host: bbchain2,  ip: 152.94.162.12, port: 7000, group: lan}
  - {id: "3",  host: bbchain3,  ip: 152.94.162.13, port: 7000, group: lan}
